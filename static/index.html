<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<script>(function(){var t=localStorage.getItem('odito-theme')||'light';document.documentElement.dataset.theme=t;})()</script>
<script src="/static/i18n.js?v=3"></script>
<title>ODITO — Dashboard</title>
<style>
:root{--bg:#f0f2f8;--surface:#fff;--surface2:#e8eaf6;--border:#c5cae9;--text:#1a1d27;--text2:#555f7e;--accent:#4263eb;--accent2:#3451d1;--danger:#f03e3e;--success:#37b24d;--warn:#f59f00;--info:#1c7ed6;
--p1:#f03e3e;--p2:#f59f00;--p3:#1c7ed6;--p4:#37b24d}
[data-theme=dark]{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3349;--text:#e8eaf6;--text2:#8892b0;--accent:#5c7cfa;--accent2:#4263eb}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
.nav-logo{font-size:1.3rem;font-weight:800;color:var(--accent);text-decoration:none;margin-right:auto}
.nav-link{color:var(--text2);text-decoration:none;font-size:.9rem;padding:.4rem .75rem;border-radius:6px;transition:background .2s}
.nav-link:hover,.nav-link.active{background:var(--surface2);color:var(--text)}
.nav-btn{padding:.4rem .9rem;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:.85rem;cursor:pointer;text-decoration:none}
.theme-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:.4rem .7rem;border-radius:6px;cursor:pointer;font-size:.85rem}
main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:1.6rem;margin-bottom:.25rem}
.subtitle{color:var(--text2);margin-bottom:2rem;font-size:.95rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem}
.stat-card .val{font-size:2.2rem;font-weight:700;line-height:1}
.stat-card .lbl{color:var(--text2);font-size:.8rem;margin-top:.4rem}
.stat-card.danger .val{color:var(--danger)}
.stat-card.warn .val{color:var(--warn)}
.stat-card.success .val{color:var(--success)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.5rem}
.section-title{font-size:1rem;font-weight:600;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between}
.section-title a{font-size:.8rem;color:var(--accent);text-decoration:none}
.badge{display:inline-block;padding:.2rem .6rem;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:.3px}
.badge.p1{background:#f03e3e22;color:var(--p1)}.badge.p2{background:#f59f0022;color:var(--p2)}
.badge.p3{background:#1c7ed622;color:var(--p3)}.badge.p4{background:#37b24d22;color:var(--p4)}
.badge.open{background:#5c7cfa22;color:var(--accent)}.badge.closed{background:#37b24d22;color:var(--success)}
.badge.satisfactory{background:#37b24d22;color:var(--success)}.badge.unsatisfactory{background:#f03e3e22;color:var(--danger)}
.badge.poor{background:#f03e3e33;color:var(--danger)}.badge.good{background:#37b24d22;color:var(--success)}
.audit-item{padding:.75rem 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem;cursor:pointer;transition:background .15s}
.audit-item:last-child{border-bottom:none}
.audit-item:hover{background:var(--surface2);margin:0 -.5rem;padding:.75rem .5rem;border-radius:6px}
.audit-ref{font-size:.75rem;color:var(--text2);font-family:monospace}
.audit-title{font-size:.9rem;flex:1}
.audit-meta{font-size:.75rem;color:var(--text2)}
.dl-item{padding:.6rem 0;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto;gap:.5rem;align-items:start}
.dl-item:last-child{border-bottom:none}
.dl-text{font-size:.85rem}.dl-sub{font-size:.75rem;color:var(--text2);margin-top:.15rem}
.dl-date{font-size:.75rem;font-weight:600;white-space:nowrap}
.dl-date.overdue{color:var(--danger)}.dl-date.soon{color:var(--warn)}
.pbar-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem}
.pbar-label{font-size:.8rem;width:70px;flex-shrink:0}
.pbar-wrap{flex:1;background:var(--surface2);border-radius:4px;height:8px}
.pbar-fill{height:8px;border-radius:4px;transition:width .5s}
.pbar-val{font-size:.8rem;color:var(--text2);width:20px;text-align:right}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">ODITO</a>
  <a class="nav-link active" href="/" id="navDashboard">Dashboard</a>
  <a class="nav-link" href="/my-actions" id="navActions" style="display:none">My Actions</a>
  <a class="nav-link" id="navNewAudit" href="/audit/new" style="display:none">+ New Audit</a>
  <a class="nav-link" id="navRemReport" href="/remediation-report" style="display:none">📊 Remediation Report</a>
  <a class="nav-link" href="/admin" id="navAdmin" style="display:none">Admin</a>
  <div class="lang-switcher">
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="it" onclick="setLang('it')">IT</button>
    <button class="lang-btn" data-lang="el" onclick="setLang('el')">EL</button>
  </div>
  <button class="theme-btn" onclick="toggleTheme()">🌓</button>
  <a class="nav-btn" href="#" id="navUser" onclick="logout()">Log Out</a>
</nav>

<main>
  <h1 id="pageTitle">Dashboard</h1>
  <p class="subtitle" id="greet"></p>

  <div class="stats">
    <div class="stat-card"><div class="val" id="sAudits">—</div><div class="lbl" id="lblAudits"></div></div>
    <div class="stat-card warn"><div class="val" id="sOpen">—</div><div class="lbl" id="lblOpen"></div></div>
    <div class="stat-card danger"><div class="val" id="sFindings">—</div><div class="lbl" id="lblFindings"></div></div>
    <div class="stat-card danger"><div class="val" id="sOverdue">—</div><div class="lbl" id="lblOverdue"></div></div>
    <div class="stat-card success"><div class="val" id="sDone">—</div><div class="lbl" id="lblDone"></div></div>
  </div>

  <div class="grid2">
    <div class="section-card">
      <div class="section-title">
        <span id="lblRecentAudits"></span>
        <a href="/audit/new" id="linkNew" style="display:none">+ New</a>
      </div>
      <div id="auditList"></div>
    </div>
    <div>
      <div class="section-card" style="margin-bottom:1.5rem">
        <div class="section-title"><span id="lblByPriority"></span></div>
        <div id="priorBars"></div>
      </div>
      <div class="section-card">
        <div class="section-title"><span id="lblDeadlines"></span></div>
        <div id="deadlines"></div>
      </div>
    </div>
  </div>
</main>

<script>
const RESULT_CLS={'Good':'good','Satisfactory':'satisfactory','Unsatisfactory':'unsatisfactory','Poor':'poor'};

function toggleTheme(){const th=document.documentElement.dataset.theme==='light'?'dark':'light';document.documentElement.dataset.theme=th;localStorage.setItem('odito-theme',th);}
async function logout(){await fetch('/api/auth/logout',{method:'POST'});window.location.href='/login';}
function fmtDate(s){if(!s)return'—';return new Date(s+'T00:00:00').toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'});}
function isOverdue(d){if(!d)return false;return new Date(d+'T00:00:00')<new Date();}
function isSoon(d){if(!d)return false;const diff=(new Date(d+'T00:00:00')-new Date())/86400000;return diff>=0&&diff<=14;}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function applyStatLabels(){
  document.getElementById('lblAudits').textContent=t('stat.total_audits');
  document.getElementById('lblOpen').textContent=t('stat.open_audits');
  document.getElementById('lblFindings').textContent=t('stat.open_findings');
  document.getElementById('lblOverdue').textContent=t('stat.overdue');
  document.getElementById('lblDone').textContent=t('stat.completed');
  document.getElementById('lblRecentAudits').textContent=t('stat.recent_audits');
  document.getElementById('lblByPriority').textContent=t('stat.by_priority');
  document.getElementById('lblDeadlines').textContent=t('stat.deadlines');
}

function renderPage(){
  applyNavLinks();
  applyStatLabels();
  applyTranslations();
  if(window._dashData) renderDashboard(window._dashData, window._meData);
}

async function init(){
  const me=await fetch('/api/auth/me').then(r=>r.json());
  if(!me.authenticated){window.location.href='/login';return;}
  window._meData=me;
  setNavUser(me);
  applyNavLinks();
  applyStatLabels();
  document.getElementById('greet').textContent=`${t('greeting')}, ${me.name}`;
  if(me.role==='auditor'||me.is_admin){
    document.getElementById('navNewAudit').style.display='';
    document.getElementById('navRemReport').style.display='';
    document.getElementById('linkNew').style.display='';
  }
  if(me.is_admin) document.getElementById('navAdmin').style.display='';
  document.getElementById('navActions').style.display='';

  const data=await fetch('/api/dashboard').then(r=>r.json());
  window._dashData=data;
  renderDashboard(data, me);
}

function renderDashboard(data, me){
  document.getElementById('sAudits').textContent=data.total_audits;
  document.getElementById('sOpen').textContent=data.open_audits;
  document.getElementById('sFindings').textContent=data.open_findings;
  document.getElementById('sOverdue').textContent=data.overdue_measures;
  document.getElementById('sDone').textContent=data.completed_measures;

  const al=document.getElementById('auditList');
  if(!data.recent_audits.length){al.innerHTML=`<span style="color:var(--text2);font-size:.9rem">${t('msg.no_audits')}</span>`;return;}
  al.innerHTML=data.recent_audits.map(a=>{
    const rc=RESULT_CLS[a.overall_result]||'';
    const rb=a.overall_result?`<span class="badge ${rc}">${a.overall_result}</span>`:'';
    return `<div class="audit-item" onclick="location.href='/audit/${a.id}'">
      <div style="flex:1">
        <div class="audit-ref">${a.report_ref}</div>
        <div class="audit-title">${escHtml(a.title)}</div>
        <div class="audit-meta">${escHtml(a.audited_entity||'')} &nbsp;·&nbsp; ${a.finding_count||0} ${t('msg.findings')}</div>
      </div>${rb}</div>`;
  }).join('');

  const bp=data.findings_by_priority;
  const maxVal=Math.max(1,...Object.values(bp));
  const pb=document.getElementById('priorBars');
  pb.innerHTML='';
  [1,2,3,4].forEach(p=>{
    const n=bp[p]||0, pct=Math.round(n/maxVal*100);
    const cls=`p${p}`, lbl=t(`priority.${p}`);
    const colors={p1:'var(--p1)',p2:'var(--p2)',p3:'var(--p3)',p4:'var(--p4)'};
    pb.innerHTML+=`<div class="pbar-row">
      <div class="pbar-label"><span class="badge ${cls}">${lbl}</span></div>
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%;background:${colors[cls]}"></div></div>
      <div class="pbar-val">${n}</div></div>`;
  });

  const dl=document.getElementById('deadlines');
  if(!data.upcoming_deadlines.length){dl.innerHTML=`<span style="color:var(--text2);font-size:.85rem">${t('msg.no_deadlines')}</span>`;return;}
  dl.innerHTML=data.upcoming_deadlines.map(m=>{
    const od=isOverdue(m.deadline), so=!od&&isSoon(m.deadline);
    const pCls=`p${m.priority||3}`, pLbl=t(`priority.${m.priority||3}`);
    return `<div class="dl-item">
      <div>
        <div class="dl-text">${escHtml((m.description||'').substring(0,60))}${(m.description||'').length>60?'…':''}</div>
        <div class="dl-sub"><span class="badge ${pCls}">${pLbl}</span> &nbsp;${m.report_ref||''} · ${m.action_owner_name||'—'}</div>
      </div>
      <div class="dl-date ${od?'overdue':so?'soon':''}">${fmtDate(m.deadline)}</div></div>`;
  }).join('');
}

applyTranslations();
init();
</script>
</body></html>
