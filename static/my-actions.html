<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<script>(function(){var t=localStorage.getItem('odito-theme')||'light';document.documentElement.dataset.theme=t;})()</script>
<script src="/static/i18n.js"></script>
<title>ODITO — My Actions</title>
<style>
:root{--bg:#f0f2f8;--surface:#fff;--surface2:#e8eaf6;--border:#c5cae9;--text:#1a1d27;--text2:#555f7e;--accent:#4263eb;--accent2:#3451d1;--danger:#f03e3e;--success:#37b24d;--warn:#f59f00;--info:#1c7ed6;
--p1:#f03e3e;--p2:#f59f00;--p3:#1c7ed6;--p4:#37b24d}
[data-theme=dark]{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3349;--text:#e8eaf6;--text2:#8892b0;--accent:#5c7cfa;--accent2:#4263eb}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
.nav-logo{font-size:1.3rem;font-weight:800;color:var(--accent);text-decoration:none;margin-right:auto}
.nav-link{color:var(--text2);text-decoration:none;font-size:.9rem;padding:.4rem .75rem;border-radius:6px;transition:background .2s}
.nav-link.active,.nav-link:hover{background:var(--surface2);color:var(--text)}
.nav-btn{padding:.4rem .9rem;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:.85rem;cursor:pointer;text-decoration:none}
.theme-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:.4rem .7rem;border-radius:6px;cursor:pointer;font-size:.85rem}
main{max-width:1000px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:1.5rem;margin-bottom:.25rem}
.subtitle{color:var(--text2);margin-bottom:1.75rem;font-size:.9rem}
.filter-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.filter-row label{font-size:.8rem;color:var(--text2)}
.filter-row select{padding:.4rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;outline:none;cursor:pointer}
.filter-row select option{background:var(--surface)}
.badge{display:inline-block;padding:.22rem .6rem;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.3px}
.badge.p1{background:#f03e3e22;color:var(--p1)}
.badge.p2{background:#f59f0022;color:var(--p2)}
.badge.p3{background:#1c7ed622;color:var(--p3)}
.badge.p4{background:#37b24d22;color:var(--p4)}
.badge.pending{background:#5c7cfa22;color:var(--accent)}
.badge.in_progress{background:#f59f0022;color:var(--warn)}
.badge.completed{background:#37b24d22;color:var(--success)}
.badge.overdue{background:#f03e3e22;color:var(--danger)}
.measure-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.4rem;margin-bottom:1.1rem;transition:border-color .2s}
.measure-card.expanded{border-color:var(--accent)}
.measure-card-top{display:flex;align-items:flex-start;gap:.75rem;cursor:pointer}
.measure-card-top:hover .mc-title{color:var(--accent)}
.mc-badges{display:flex;gap:.5rem;flex-shrink:0;align-items:center}
.mc-title{font-size:.95rem;font-weight:600;flex:1;line-height:1.4}
.mc-meta{font-size:.78rem;color:var(--text2);margin-top:.4rem;display:flex;flex-wrap:wrap;gap:.75rem}
.mc-meta .overdue-date{color:var(--danger);font-weight:600}
.mc-audit-ref{font-size:.72rem;color:var(--text2);font-family:monospace;margin-top:.25rem}
.expand-body{margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem;display:none}
.measure-card.expanded .expand-body{display:block}
.expand-desc{font-size:.85rem;color:var(--text2);line-height:1.6;margin-bottom:1rem;white-space:pre-wrap}
.status-row{display:flex;align-items:center;gap:.65rem;margin-bottom:1rem;flex-wrap:wrap}
.status-row label{font-size:.8rem;color:var(--text2)}
.status-row select{padding:.35rem .7rem;font-size:.8rem;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text);outline:none;cursor:pointer}
.btn{padding:.5rem 1.1rem;border:none;border-radius:7px;font-size:.85rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn-sm{padding:.38rem .85rem;font-size:.8rem}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:var(--surface2);color:var(--text2)}.btn-ghost:hover{background:var(--border)}
.log-section{margin-top:.5rem}
.log-section-title{font-size:.78rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.65rem}
.log-entry{padding:.55rem 0;border-bottom:1px solid var(--border);font-size:.83rem}
.log-entry:last-child{border-bottom:none}
.log-meta{font-size:.72rem;color:var(--text2);margin-top:.2rem}
.log-add{display:flex;gap:.5rem;margin-top:.75rem}
.log-add textarea{flex:1;padding:.5rem .75rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.83rem;outline:none;resize:none;height:56px;font-family:inherit;transition:border .2s}
.log-add textarea:focus{border-color:var(--accent)}
.err-inline{color:var(--danger);font-size:.78rem;margin-top:.3rem;display:none}
.empty-state{text-align:center;padding:3rem;color:var(--text2);font-size:.9rem}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">ODITO</a>
  <a class="nav-link" href="/" id="navDashboard">Dashboard</a>
  <a class="nav-link active" href="/my-actions" id="navActions">My Actions</a>
  <a class="nav-link" href="/admin" id="navAdmin" style="display:none">Admin</a>
  <div class="lang-switcher">
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="it" onclick="setLang('it')">IT</button>
    <button class="lang-btn" data-lang="el" onclick="setLang('el')">EL</button>
  </div>
  <button class="theme-btn" onclick="toggleTheme()">🌓</button>
  <a class="nav-btn" href="#" id="navUser" onclick="logout()">Log Out</a>
</nav>

<main>
  <h1 id="pageTitle">My Actions</h1>
  <p class="subtitle" id="subtitle"></p>

  <div class="filter-row">
    <label id="lblFilterStatus"></label>
    <select id="filterStatus" onchange="applyFilter()">
      <option value="" data-i18n="filter.all_status">All</option>
      <option value="pending" data-i18n="status.pending">Pending</option>
      <option value="in_progress" data-i18n="status.in_progress">In Progress</option>
      <option value="completed" data-i18n="status.completed">Completed</option>
      <option value="overdue" data-i18n="status.overdue">Overdue</option>
    </select>
    <label id="lblFilterPriority"></label>
    <select id="filterPriority" onchange="applyFilter()">
      <option value="" data-i18n="filter.all_priority">All</option>
      <option value="1" data-i18n="priority.1">High</option>
      <option value="2" data-i18n="priority.2">Relevant</option>
      <option value="3" data-i18n="priority.3">Medium</option>
      <option value="4" data-i18n="priority.4">Low</option>
    </select>
  </div>

  <div id="actionList"><p style="color:var(--text2);font-size:.9rem" id="loadingMsg"></p></div>
</main>

<script>
let allMeasures=[], currentMe=null;

function toggleTheme(){const th=document.documentElement.dataset.theme==='light'?'dark':'light';document.documentElement.dataset.theme=th;localStorage.setItem('odito-theme',th);}
async function logout(){await fetch('/api/auth/logout',{method:'POST'});window.location.href='/login';}
function fmtDate(s){if(!s)return'—';return new Date(s+'T00:00:00').toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'});}
function fmtTs(s){if(!s)return'—';return new Date(s).toLocaleString(undefined,{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function isOverdue(d){if(!d)return false;return new Date(d+'T00:00:00')<new Date();}

function applyPageLabels(){
  document.getElementById('pageTitle').textContent=t('page.my_actions');
  if(currentMe) document.getElementById('subtitle').textContent=`${t('greeting')}, ${currentMe.name}`;
  document.getElementById('lblFilterStatus').textContent=t('filter.status');
  document.getElementById('lblFilterPriority').textContent=t('filter.priority');
  const lm=document.getElementById('loadingMsg');
  if(lm) lm.textContent=t('msg.loading');
}

function renderPage(){
  applyNavLinks();
  applyPageLabels();
  applyTranslations();
  if(window._measuresLoaded) applyFilter();
}

async function init(){
  const me=await fetch('/api/auth/me').then(r=>r.json());
  if(!me.authenticated){window.location.href='/login';return;}
  currentMe=me;
  window._meData=me;
  setNavUser(me);
  applyNavLinks();
  if(me.is_admin) document.getElementById('navAdmin').style.display='';
  applyPageLabels();
  document.getElementById('subtitle').textContent=`${t('greeting')}, ${me.name}`;

  allMeasures=await fetch('/api/my-actions').then(r=>r.json());
  window._measuresLoaded=true;
  applyFilter();
}

function applyFilter(){
  const st=document.getElementById('filterStatus').value;
  const pr=document.getElementById('filterPriority').value;
  let filtered=allMeasures.filter(m=>{
    const od=isOverdue(m.deadline)&&m.status!=='completed';
    const effStatus=od?'overdue':m.status;
    if(st&&effStatus!==st) return false;
    if(pr&&String(m.priority)!==pr) return false;
    return true;
  });
  renderMeasures(filtered);
}

function renderMeasures(measures){
  const el=document.getElementById('actionList');
  if(!measures.length){el.innerHTML=`<div class="empty-state">${t('msg.no_actions')}</div>`;return;}
  el.innerHTML=measures.map(m=>{
    const pCls=`p${m.priority||3}`, pLbl=t(`priority.${m.priority||3}`);
    const od=isOverdue(m.deadline)&&m.status!=='completed';
    const stCls=od?'overdue':m.status;
    const stLbl=od?t('status.overdue'):t(`status.${m.status}`)||m.status;
    const dateClass=od?'overdue-date':'';
    return `<div class="measure-card" id="mc-${m.id}">
      <div class="measure-card-top" onclick="toggleExpand(${m.id})">
        <div style="flex:1">
          <div class="mc-title">${escHtml(m.description)}</div>
          <div class="mc-meta">
            <span class="${dateClass}">📅 ${fmtDate(m.deadline)}</span>
          </div>
          <div class="mc-audit-ref">
            <a href="/finding/${m.finding_id}" onclick="event.stopPropagation()" style="color:var(--accent);text-decoration:none">
              ${escHtml(m.report_ref||'—')} › ${escHtml(m.finding_ref||'—')} › ${escHtml(m.finding_title||'')}
            </a>
          </div>
        </div>
        <div class="mc-badges">
          <span class="badge ${pCls}">${pLbl}</span>
          <span class="badge ${stCls}">${stLbl}</span>
        </div>
      </div>
      <div class="expand-body">
        ${m.description?`<div class="expand-desc">${escHtml(m.description)}</div>`:''}
        <div class="status-row">
          <label>${t('btn.update_status')}</label>
          <select onchange="updateStatus(${m.id}, this.value)">
            <option value="pending" ${m.status==='pending'?'selected':''}>${t('status.pending')}</option>
            <option value="in_progress" ${m.status==='in_progress'?'selected':''}>${t('status.in_progress')}</option>
            <option value="completed" ${m.status==='completed'?'selected':''}>${t('status.completed')}</option>
          </select>
        </div>
        <div class="log-section">
          <div class="log-section-title">${t('section.log')}</div>
          <div id="log-${m.id}"><span style="color:var(--text2);font-size:.82rem">${t('msg.loading')}</span></div>
          <div class="log-add">
            <textarea id="logtxt-${m.id}" placeholder="${escHtml(t('err.enter_note'))}"></textarea>
            <button class="btn btn-primary btn-sm" onclick="addLog(${m.id})">${t('btn.send')}</button>
          </div>
          <div class="err-inline" id="logerr-${m.id}"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function toggleExpand(id){
  const card=document.getElementById(`mc-${id}`);
  const wasExpanded=card.classList.contains('expanded');
  document.querySelectorAll('.measure-card.expanded').forEach(c=>c.classList.remove('expanded'));
  if(!wasExpanded){
    card.classList.add('expanded');
    await loadLogs(id);
  }
}

async function updateStatus(measureId, status){
  const r=await fetch(`/api/measures/${measureId}/status`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});
  if(r.ok){
    allMeasures=await fetch('/api/my-actions').then(r=>r.json());
    applyFilter();
  }
}

async function loadLogs(measureId){
  const logs=await fetch(`/api/measures/${measureId}/logs`).then(r=>r.json());
  const el=document.getElementById(`log-${measureId}`);
  if(!el) return;
  if(!logs.length){el.innerHTML=`<p style="color:var(--text2);font-size:.8rem;margin-bottom:.4rem">${t('msg.no_logs')}</p>`;return;}
  el.innerHTML=logs.map(l=>`<div class="log-entry">
    <div>${escHtml(l.note)}</div>
    <div class="log-meta">${escHtml(l.author_name||'—')} · ${fmtTs(l.created_at)}</div>
  </div>`).join('');
}

async function addLog(measureId){
  const txt=document.getElementById(`logtxt-${measureId}`);
  const errEl=document.getElementById(`logerr-${measureId}`);
  errEl.style.display='none';
  const note=txt.value.trim();
  if(!note){errEl.textContent=t('err.enter_note');errEl.style.display='block';return;}
  const r=await fetch(`/api/measures/${measureId}/logs`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note})});
  if(r.ok){txt.value='';await loadLogs(measureId);}
  else{const d=await r.json();errEl.textContent=d.detail||t('err.all_fields');errEl.style.display='block';}
}

applyTranslations();
init();
</script>
</body></html>
