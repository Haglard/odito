<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<script>(function(){var t=localStorage.getItem('odito-theme')||'light';document.documentElement.dataset.theme=t;})()</script>
<script src="/static/i18n.js"></script>
<title>ODITO — New Audit</title>
<style>
:root{--bg:#f0f2f8;--surface:#fff;--surface2:#e8eaf6;--border:#c5cae9;--text:#1a1d27;--text2:#555f7e;--accent:#4263eb;--accent2:#3451d1;--danger:#f03e3e;--success:#37b24d;--warn:#f59f00}
[data-theme=dark]{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3349;--text:#e8eaf6;--text2:#8892b0;--accent:#5c7cfa;--accent2:#4263eb}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
.nav-logo{font-size:1.3rem;font-weight:800;color:var(--accent);text-decoration:none;margin-right:auto}
.nav-link{color:var(--text2);text-decoration:none;font-size:.9rem;padding:.4rem .75rem;border-radius:6px;transition:background .2s}
.nav-link:hover{background:var(--surface2);color:var(--text)}
.theme-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:.4rem .7rem;border-radius:6px;cursor:pointer;font-size:.85rem}
.nav-btn{padding:.4rem .9rem;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:.85rem;cursor:pointer;text-decoration:none}
main{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:1.5rem;margin-bottom:.25rem}
.subtitle{color:var(--text2);margin-bottom:2rem;font-size:.9rem}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.75rem;margin-bottom:1.5rem}
.section-title{font-size:1rem;font-weight:600;margin-bottom:1.25rem;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:.6rem;display:flex;align-items:center;gap:.5rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}
.field{margin-bottom:1rem}
label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:.35rem}
input,select,textarea{width:100%;padding:.65rem .9rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;outline:none;transition:border .2s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--surface)}
.btn{padding:.65rem 1.5rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:var(--surface2);color:var(--text2)}.btn-ghost:hover{background:var(--border)}
.actions{display:flex;gap:1rem;margin-top:1.5rem}
.err{background:#f03e3e22;border:1px solid var(--danger);color:var(--danger);padding:.7rem 1rem;border-radius:8px;margin-top:1rem;font-size:.85rem;display:none}

/* ── PDF IMPORT ── */
.pdf-drop{border:2px dashed var(--border);border-radius:10px;padding:2rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:1rem}
.pdf-drop:hover,.pdf-drop.dragover{border-color:var(--accent);background:var(--surface2)}
.pdf-drop-icon{font-size:2.5rem;margin-bottom:.5rem}
.pdf-drop-text{font-size:.9rem;color:var(--text2)}
.pdf-drop-text span{color:var(--accent);font-weight:600}
.pdf-drop-hint{font-size:.78rem;color:var(--text2);margin-top:.3rem}
.pdf-status{border-radius:8px;padding:.85rem 1rem;font-size:.88rem;margin-top:.75rem;display:none;align-items:center;gap:.75rem}
.pdf-status.loading{background:#5c7cfa18;border:1px solid var(--accent);color:var(--accent);display:flex}
.pdf-status.success{background:#37b24d18;border:1px solid var(--success);color:var(--success);display:flex}
.pdf-status.error{background:#f03e3e18;border:1px solid var(--danger);color:var(--danger);display:flex}
.spin{display:inline-block;animation:spin 1s linear infinite;font-size:1.1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.key-row{display:flex;gap:.5rem;align-items:center;margin-top:.75rem}
.key-row input{font-size:.82rem}
.key-toggle{font-size:.78rem;color:var(--accent);cursor:pointer;white-space:nowrap;padding:.3rem .6rem;border:1px solid var(--border);border-radius:6px;background:none;flex-shrink:0}
.key-toggle:hover{background:var(--surface2)}

/* ── FINDINGS PREVIEW ── */
.findings-preview{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.5rem;margin-bottom:1.5rem;display:none}
.fp-title{font-size:.95rem;font-weight:600;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.fp-item{display:flex;align-items:flex-start;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border)}
.fp-item:last-child{border-bottom:none}
.fp-ref{font-size:.72rem;font-family:monospace;color:var(--text2);background:var(--surface2);padding:.2rem .45rem;border-radius:4px;white-space:nowrap;flex-shrink:0}
.fp-body{flex:1}
.fp-name{font-size:.88rem;font-weight:600}
.fp-sub{font-size:.75rem;color:var(--text2);margin-top:.15rem}
.badge{display:inline-block;padding:.2rem .55rem;border-radius:12px;font-size:.7rem;font-weight:700}
.badge.p1{background:#f03e3e22;color:#f03e3e}
.badge.p2{background:#f59f0022;color:#f59f00}
.badge.p3{background:#1c7ed622;color:#1c7ed6}
.badge.p4{background:#37b24d22;color:#37b24d}
.fp-remove{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem;padding:.2rem .4rem;border-radius:4px;flex-shrink:0}
.fp-remove:hover{background:var(--surface2);color:var(--danger)}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">ODITO</a>
  <a class="nav-link" href="/" id="navDashboard">Dashboard</a>
  <a class="nav-link" id="navRemReport" href="/remediation-report">📊 Remediation Report</a>
  <div class="lang-switcher">
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="it" onclick="setLang('it')">IT</button>
    <button class="lang-btn" data-lang="el" onclick="setLang('el')">EL</button>
  </div>
  <button class="theme-btn" onclick="toggleTheme()">🌓</button>
  <a class="nav-btn" href="#" id="navUser" onclick="logout()">Log Out</a>
</nav>

<main>
  <h1 id="pageTitle" data-i18n="page.new_audit">New Audit Report</h1>
  <p class="subtitle" data-i18n="page.new_audit_sub">Import from PDF or fill manually</p>

  <!-- ── PDF IMPORT CARD ── -->
  <div class="form-card">
    <div class="section-title" id="pdfSectionTitle">🤖 Import from PDF with AI</div>
    <div class="pdf-drop" id="pdfDrop"
         onclick="document.getElementById('pdfInput').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="handleDrop(event)">
      <div class="pdf-drop-icon">📄</div>
      <div class="pdf-drop-text" id="pdfDropText"><span id="pdfDropLink">click to select</span></div>
      <div class="pdf-drop-hint" id="pdfDropHint"></div>
    </div>
    <input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="handlePdfSelect(this.files[0])">

    <div class="pdf-status" id="pdfStatus"></div>

    <div id="keyRow" class="key-row" style="display:none">
      <input type="password" id="openaiKey" id="openaiKeyInput">
      <button class="key-toggle" id="btnExtract" onclick="extractPdf()">🚀 Extract</button>
    </div>
    <div id="keyHint" style="font-size:.75rem;color:var(--text2);margin-top:.5rem;display:none"></div>
  </div>

  <!-- ── MANUAL FORM ── -->
  <div class="form-card">
    <div class="section-title" id="sReportHeader"></div>
    <div class="grid2">
      <div class="field"><label id="lReportRef"></label><input id="report_ref" placeholder="e.g. 2025-NPG-003"></div>
      <div class="field"><label id="lTitle"></label><input id="title" placeholder="e.g. DORA Compliance Audit"></div>
      <div class="field"><label id="lAuditedEntity"></label><input id="audited_entity" placeholder="e.g. Nexi Greece Payments"></div>
      <div class="field"><label id="lAuditType"></label><input id="audit_type" placeholder="e.g. Planned Standard Audit"></div>
      <div class="field"><label id="lAuditClass"></label><input id="audit_class" placeholder="e.g. Legal Entity Audit"></div>
      <div class="field"><label id="lOverallResult"></label>
        <select id="overall_result">
          <option value="" id="optChoose"></option>
          <option>Good</option><option>Satisfactory</option>
          <option>Unsatisfactory</option><option>Poor</option>
        </select>
      </div>
      <div class="field"><label id="lPrevResult"></label><input id="previous_result" placeholder="e.g. Satisfactory"></div>
      <div class="field"><label id="lPrevResultDate"></label><input id="previous_result_date" type="date"></div>
      <div class="field"><label id="lIssueDate"></label><input id="issue_date" type="date"></div>
    </div>
  </div>

  <div class="form-card">
    <div class="section-title" id="sPeriods"></div>
    <div class="grid2">
      <div class="field"><label id="lSampleFrom"></label><input id="sample_from" type="date"></div>
      <div class="field"><label id="lSampleTo"></label><input id="sample_to" type="date"></div>
      <div class="field"><label id="lFieldFrom"></label><input id="field_from" type="date"></div>
      <div class="field"><label id="lFieldTo"></label><input id="field_to" type="date"></div>
    </div>
  </div>

  <div class="form-card">
    <div class="section-title" id="sAuditTeam"></div>
    <div class="grid2">
      <div class="field"><label id="lCae"></label><input id="cae" placeholder="Name Surname"></div>
      <div class="field"><label id="lTeamManager"></label><input id="team_manager" placeholder="Name Surname"></div>
      <div class="field"><label id="lTeam"></label><input id="team" placeholder="e.g. Mario Rossi, Anna Bianchi"></div>
      <div class="field"><label id="lExitDate"></label><input id="exit_date" type="date"></div>
    </div>
    <div class="field"><label id="lExitParticipants"></label>
      <textarea id="exit_participants" placeholder="e.g. Martha Kanner (COO), John Smith (CISO), ..."></textarea>
    </div>
  </div>

  <div class="form-card">
    <div class="section-title" id="sBackground"></div>
    <div class="field">
      <textarea id="background" style="min-height:140px"></textarea>
    </div>
  </div>

  <!-- ── FINDINGS PREVIEW ── -->
  <div class="findings-preview" id="findingsPreview">
    <div class="fp-title">
      <span id="fpTitle"></span>
      <span style="font-size:.78rem;color:var(--text2);font-weight:400" id="fpAutoCreate"></span>
    </div>
    <div id="fpList"></div>
  </div>

  <div class="err" id="err"></div>
  <div class="actions">
    <button class="btn btn-primary" id="btnSave" onclick="save()">Create Report</button>
    <button class="btn btn-ghost" id="btnCancel" onclick="history.back()">Cancel</button>
  </div>
</main>

<script>
let extractedFindings=[];
let pendingFile=null;

function toggleTheme(){const th=document.documentElement.dataset.theme==='light'?'dark':'light';document.documentElement.dataset.theme=th;localStorage.setItem('odito-theme',th);}
async function logout(){await fetch('/api/auth/logout',{method:'POST'});window.location.href='/login';}
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function applyPageLabels(){
  // Nav
  applyNavLinks();
  // PDF section
  document.getElementById('pdfSectionTitle').textContent=t('pdf.title');
  document.getElementById('pdfDropText').innerHTML=`${t('pdf.drop')} <span>${t('pdf.drop_link')}</span>`;
  document.getElementById('pdfDropHint').textContent=t('pdf.hint');
  document.getElementById('btnExtract').textContent=t('btn.extract');
  document.getElementById('openaiKey').placeholder=t('pdf.key_placeholder');
  document.getElementById('keyHint').textContent=t('pdf.key_hint');
  document.getElementById('fpAutoCreate').textContent=t('pdf.auto_create');
  // Section titles
  document.getElementById('sReportHeader').textContent=t('section.report_header');
  document.getElementById('sPeriods').textContent=t('section.periods');
  document.getElementById('sAuditTeam').textContent=t('section.audit_team');
  document.getElementById('sBackground').textContent=t('section.background');
  // Form labels
  document.getElementById('lReportRef').textContent=t('label.report_ref');
  document.getElementById('lTitle').textContent=t('label.title');
  document.getElementById('lAuditedEntity').textContent=t('label.audited_entity');
  document.getElementById('lAuditType').textContent=t('label.audit_type');
  document.getElementById('lAuditClass').textContent=t('label.audit_class');
  document.getElementById('lOverallResult').textContent=t('label.overall_result');
  document.getElementById('lPrevResult').textContent=t('label.previous_result');
  document.getElementById('lPrevResultDate').textContent=t('label.previous_result_date');
  document.getElementById('lIssueDate').textContent=t('label.issue_date');
  document.getElementById('lSampleFrom').textContent=t('label.sample_from');
  document.getElementById('lSampleTo').textContent=t('label.sample_to');
  document.getElementById('lFieldFrom').textContent=t('label.field_from');
  document.getElementById('lFieldTo').textContent=t('label.field_to');
  document.getElementById('lCae').textContent=t('label.cae');
  document.getElementById('lTeamManager').textContent=t('label.team_manager');
  document.getElementById('lTeam').textContent=t('label.team');
  document.getElementById('lExitDate').textContent=t('label.exit_date');
  document.getElementById('lExitParticipants').textContent=t('label.exit_participants');
  document.getElementById('optChoose').textContent=t('select.choose');
  // Buttons
  document.getElementById('btnSave').textContent=t('btn.create_report');
  document.getElementById('btnCancel').textContent=t('btn.cancel');
  // Background placeholder
  document.getElementById('background').placeholder=t('label.background')+'...';
  // Findings preview title (re-render count if needed)
  if(extractedFindings.length>0) renderFindingsPreview();
}

function renderPage(){
  applyPageLabels();
  applyTranslations();
}

// ── Drag & drop ──────────────────────────────────────────
function handleDrop(e){
  e.preventDefault();
  document.getElementById('pdfDrop').classList.remove('dragover');
  const file=e.dataTransfer.files[0];
  if(file) handlePdfSelect(file);
}

function handlePdfSelect(file){
  if(!file||file.type!=='application/pdf'){
    showPdfStatus('error','⚠ '+t('err.all_fields'));
    return;
  }
  pendingFile=file;
  document.getElementById('pdfDropText').innerHTML=`<strong>${escHtml(file.name)}</strong> (${(file.size/1024).toFixed(0)} KB)`;

  fetch('/api/audits/check-openai').then(r=>r.json()).then(d=>{
    if(d.configured){
      extractPdf();
    } else {
      document.getElementById('keyRow').style.display='flex';
      document.getElementById('keyHint').style.display='block';
      showPdfStatus('loading','🔑 '+t('pdf.key_placeholder'));
    }
  }).catch(()=>extractPdf());
}

function showPdfStatus(type, msg){
  const el=document.getElementById('pdfStatus');
  el.className=`pdf-status ${type}`;
  el.style.display='flex';
  el.innerHTML=type==='loading'?`<span class="spin">⟳</span> ${msg}`:msg;
}

async function extractPdf(){
  if(!pendingFile) return;
  const key=document.getElementById('openaiKey').value.trim();
  showPdfStatus('loading',`<span class="spin">⟳</span> ${t('pdf.extracting')}`);

  const fd=new FormData();
  fd.append('file', pendingFile);
  if(key) fd.append('openai_key', key);

  try {
    const r=await fetch('/api/audits/extract-pdf',{method:'POST',body:fd});
    const d=await r.json();
    if(!r.ok){showPdfStatus('error','❌ '+(d.detail||t('err.all_fields')));return;}

    fillForm(d.audit||{});
    extractedFindings=(d.findings||[]).map((f,i)=>({...f,_id:i}));
    renderFindingsPreview();

    const nf=extractedFindings.length;
    const warn=d._truncated?' '+t('pdf.truncated'):'';
    showPdfStatus('success',`✅ ${t('pdf.success')} ${nf} ${t('pdf.found')}${warn}`);
    document.getElementById('keyRow').style.display='none';
  } catch(e){
    showPdfStatus('error','❌ '+e.message);
  }
}

function fillForm(a){
  const fv=(id,val)=>{const el=document.getElementById(id);if(el&&val!=null)el.value=val;};
  fv('report_ref',a.report_ref);      fv('title',a.title);
  fv('audited_entity',a.audited_entity); fv('audit_type',a.audit_type);
  fv('audit_class',a.audit_class);    fv('overall_result',a.overall_result);
  fv('previous_result',a.previous_result); fv('previous_result_date',a.previous_result_date);
  fv('issue_date',a.issue_date);
  fv('sample_from',a.sample_period_from); fv('sample_to',a.sample_period_to);
  fv('field_from',a.fieldwork_period_from); fv('field_to',a.fieldwork_period_to);
  fv('cae',a.chief_audit_executive);  fv('team_manager',a.audit_team_manager);
  fv('team',a.audit_team);            fv('exit_date',a.exit_meeting_date);
  fv('exit_participants',a.exit_meeting_participants);
  fv('background',a.background);
}

function renderFindingsPreview(){
  const wrap=document.getElementById('findingsPreview');
  const list=document.getElementById('fpList');
  if(!extractedFindings.length){wrap.style.display='none';return;}
  document.getElementById('fpTitle').textContent=`${t('pdf.extracted')} (${extractedFindings.length})`;
  const PRIORITY_LABEL={1:t('priority.1'),2:t('priority.2'),3:t('priority.3'),4:t('priority.4')};
  const PRIORITY_CLS={1:'p1',2:'p2',3:'p3',4:'p4'};
  list.innerHTML=extractedFindings.map(f=>`
    <div class="fp-item" id="fpi-${f._id}">
      <span class="fp-ref">${escHtml(f.finding_ref||'—')}</span>
      <div class="fp-body">
        <div class="fp-name">${escHtml(f.title)}</div>
        <div class="fp-sub">
          <span class="badge ${PRIORITY_CLS[f.priority]||'p3'}">${PRIORITY_LABEL[f.priority]||'—'}</span>
          ${f.article_ref?`&nbsp;📌 ${escHtml(f.article_ref)}`:''}
          ${f.description?`&nbsp;· ${escHtml(f.description.substring(0,80))}${f.description.length>80?'…':''}`:''}
        </div>
      </div>
      <button class="fp-remove" onclick="removeExtractedFinding(${f._id})" title="${escHtml(t('btn.delete'))}">✕</button>
    </div>`).join('');
  wrap.style.display='block';
}

function removeExtractedFinding(id){
  extractedFindings=extractedFindings.filter(f=>f._id!==id);
  renderFindingsPreview();
}

// ── Save ─────────────────────────────────────────────────
async function save(){
  const v=(id)=>document.getElementById(id).value.trim()||null;
  const err=document.getElementById('err');
  err.style.display='none';
  const report_ref=v('report_ref'), title=v('title');
  if(!report_ref||!title){err.textContent=t('err.ref_title');err.style.display='block';return;}

  const auditBody={
    report_ref, title,
    audited_entity:v('audited_entity'), audit_type:v('audit_type'), audit_class:v('audit_class'),
    overall_result:v('overall_result'), previous_result:v('previous_result'),
    previous_result_date:v('previous_result_date'), issue_date:v('issue_date'),
    sample_period_from:v('sample_from'), sample_period_to:v('sample_to'),
    fieldwork_period_from:v('field_from'), fieldwork_period_to:v('field_to'),
    exit_meeting_date:v('exit_date'), exit_meeting_participants:v('exit_participants'),
    chief_audit_executive:v('cae'), audit_team_manager:v('team_manager'),
    audit_team:v('team'), background:v('background')
  };

  if(extractedFindings.length>0){
    const r=await fetch('/api/audits/import-full',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({audit:auditBody, findings:extractedFindings})
    });
    if(r.ok){const d=await r.json();window.location.href=`/audit/${d.id}`;}
    else{const d=await r.json();err.textContent=d.detail||t('err.ref_title');err.style.display='block';}
  } else {
    const r=await fetch('/api/audits',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(auditBody)});
    if(r.ok){const d=await r.json();window.location.href=`/audit/${d.id}`;}
    else{const d=await r.json();err.textContent=d.detail||t('err.ref_title');err.style.display='block';}
  }
}

// Auth check
fetch('/api/auth/me').then(r=>r.json()).then(me=>{
  if(!me.authenticated){window.location.href='/login';return;}
  if(me.role!=='auditor'&&!me.is_admin){window.location.href='/';return;}
  setNavUser(me);
});

applyPageLabels();
applyTranslations();
</script>
</body></html>
