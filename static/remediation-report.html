<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ODITO — Remediation Report</title>
<script src="/static/i18n.js"></script>
<style>
/* ── CSS vars ── */
:root {
  --bg:#f0f2f5; --surface:#ffffff; --surface2:#f8f9fa;
  --text:#1a1a2e; --text2:#555; --border:#e0e0e0;
  --accent:#4361ee; --accent2:#3a0ca3;
  --success:#2d9d78; --warn:#e07b39; --danger:#e63946;
  --high:#e63946; --relevant:#e07b39; --medium:#f4a261; --low:#2d9d78;
  --radius:10px; --shadow:0 2px 12px rgba(0,0,0,.08);
}
[data-theme=dark]{
  --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#16213e;
  --text:#e0e0f0; --text2:#aaa; --border:#2a2a4a;
  --shadow:0 2px 12px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Nav ── */
nav{display:flex;align-items:center;gap:8px;padding:0 24px;height:56px;
    background:var(--surface);border-bottom:1px solid var(--border);
    box-shadow:var(--shadow);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.nav-logo{font-weight:800;font-size:1.2rem;color:var(--accent);text-decoration:none;margin-right:8px}
.nav-link{text-decoration:none;color:var(--text2);font-size:.85rem;padding:6px 12px;
          border-radius:6px;transition:.2s}
.nav-link:hover,.nav-link.active{background:var(--accent);color:#fff}
.lang-switcher{display:flex;gap:4px;margin-left:auto}
.lang-btn{padding:4px 8px;border:1px solid var(--border);border-radius:4px;
          background:var(--surface2);color:var(--text);cursor:pointer;font-size:.78rem}
.lang-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.theme-btn{background:none;border:1px solid var(--border);border-radius:6px;
           padding:4px 8px;cursor:pointer;font-size:1rem;color:var(--text)}
.nav-btn{text-decoration:none;background:var(--accent);color:#fff;
         padding:6px 16px;border-radius:6px;font-size:.85rem;margin-left:8px;white-space:nowrap}

/* ── Layout ── */
.page{max-width:1200px;margin:0 auto;padding:28px 20px}
.page-header{margin-bottom:28px}
.page-header h1{font-size:1.6rem;font-weight:700;color:var(--accent)}
.page-header p{color:var(--text2);margin-top:4px;font-size:.9rem}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:24px;flex-wrap:wrap}
.tab-btn{padding:10px 20px;border:none;background:none;cursor:pointer;
         font-size:.9rem;color:var(--text2);border-bottom:3px solid transparent;
         margin-bottom:-2px;border-radius:6px 6px 0 0;transition:.2s;white-space:nowrap}
.tab-btn:hover{background:var(--surface2);color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;background:var(--surface)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── Cluster group ── */
.cluster-group{margin-bottom:24px;border:1px solid var(--border);
               border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.cluster-header{display:flex;align-items:center;justify-content:space-between;
                padding:14px 18px;background:var(--surface2);
                border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.cluster-header:hover{background:var(--border)}
.cluster-title{font-weight:700;font-size:1rem;color:var(--text)}
.cluster-theme{font-size:.82rem;color:var(--text2);margin-top:2px}
.cluster-badge{background:var(--accent);color:#fff;border-radius:20px;
               padding:3px 12px;font-size:.8rem;font-weight:600;white-space:nowrap;flex-shrink:0;margin-left:10px}
.cluster-overdue .cluster-header{border-left:4px solid var(--danger)}
.cluster-body{padding:12px 16px;display:flex;flex-direction:column;gap:8px}

/* ── Measure card ── */
.measure-card{background:var(--surface2);border:1px solid var(--border);
              border-radius:8px;padding:12px 16px}
.measure-card:hover{border-color:var(--accent)}
.measure-desc{font-size:.88rem;color:var(--text);line-height:1.45}
.measure-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center}
.measure-meta a{font-size:.78rem;color:var(--accent);text-decoration:none}
.measure-meta a:hover{text-decoration:underline}
.meta-chip{font-size:.75rem;padding:2px 8px;border-radius:12px;
           font-weight:500;white-space:nowrap}
.chip-owner{background:#e8f0fe;color:#1a56db}
[data-theme=dark] .chip-owner{background:#1e3a6e;color:#7eb3ff}
.chip-deadline{background:#fce8e6;color:#c62828}
[data-theme=dark] .chip-deadline{background:#4a1515;color:#ff8a80}
.chip-deadline.ok{background:#e8f5e9;color:#2e7d32}
[data-theme=dark] .chip-deadline.ok{background:#1b3a1f;color:#81c784}
.chip-status-pending{background:#fff3e0;color:#e65100}
[data-theme=dark] .chip-status-pending{background:#3e2000;color:#ffb74d}
.chip-status-in_progress{background:#e3f2fd;color:#1565c0}
[data-theme=dark] .chip-status-in_progress{background:#0d2a4a;color:#64b5f6}
.chip-status-completed{background:#e8f5e9;color:#2e7d32}
[data-theme=dark] .chip-status-completed{background:#1b3a1f;color:#81c784}

.priority-badge{display:inline-block;font-size:.72rem;padding:2px 8px;
                border-radius:12px;font-weight:600;white-space:nowrap}
.pri-1{background:#fde8ea;color:var(--high)}
.pri-2{background:#fef3e2;color:var(--relevant)}
.pri-3{background:#fff8e1;color:var(--medium)}
.pri-4{background:#e8f5e9;color:var(--low)}
[data-theme=dark] .pri-1{background:#4a1520;color:#ff6b7a}
[data-theme=dark] .pri-2{background:#4a2e00;color:#ffb74d}
[data-theme=dark] .pri-3{background:#3a2e00;color:#ffd54f}
[data-theme=dark] .pri-4{background:#1b3a1f;color:#81c784}

/* ── Semantic panel ── */
.semantic-controls{background:var(--surface);border:1px solid var(--border);
                   border-radius:var(--radius);padding:20px;margin-bottom:20px}
.semantic-controls h3{font-size:1rem;margin-bottom:8px;color:var(--text)}
.semantic-controls p{font-size:.85rem;color:var(--text2);margin-bottom:12px}
.ai-form{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.ai-form input{flex:1;min-width:240px;padding:9px 12px;border:1px solid var(--border);
               border-radius:6px;background:var(--surface2);color:var(--text);font-size:.88rem}
.ai-form input:focus{outline:none;border-color:var(--accent)}
.btn-primary{padding:9px 20px;background:var(--accent);color:#fff;border:none;
             border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;
             transition:.2s;white-space:nowrap}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.ai-note{font-size:.78rem;color:var(--text2);margin-top:8px}

/* ── State messages ── */
.loading{text-align:center;padding:48px;color:var(--text2)}
.spinner{width:36px;height:36px;border:3px solid var(--border);
         border-top-color:var(--accent);border-radius:50%;
         animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--text2);font-size:.9rem}
.error-box{background:#fde8ea;border:1px solid var(--danger);color:#c62828;
           border-radius:8px;padding:12px 16px;font-size:.88rem;margin-bottom:16px}
[data-theme=dark] .error-box{background:#4a1520;color:#ff8a80}

/* ── Stats bar ── */
.stats-bar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.stat-pill{background:var(--surface);border:1px solid var(--border);
           border-radius:20px;padding:6px 16px;font-size:.82rem;
           display:flex;align-items:center;gap:6px}
.stat-pill strong{color:var(--accent);font-size:1rem}
.stat-pill strong.danger{color:var(--danger)}

/* ── Responsive ── */
@media(max-width:600px){
  .tab-btn{padding:8px 12px;font-size:.82rem}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">ODITO</a>
  <a class="nav-link" href="/" id="navDashboard">Dashboard</a>
  <a class="nav-link" href="/my-actions" id="navActions" style="display:none">My Actions</a>
  <a class="nav-link" id="navNewAudit" href="/audit/new" style="display:none">+ New Audit</a>
  <a class="nav-link active" id="navRemReport" href="/remediation-report">📊 Remediation Report</a>
  <a class="nav-link" href="/admin" id="navAdmin" style="display:none">Admin</a>
  <div class="lang-switcher">
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="it" onclick="setLang('it')">IT</button>
    <button class="lang-btn" data-lang="el" onclick="setLang('el')">EL</button>
  </div>
  <button class="theme-btn" onclick="toggleTheme()">🌓</button>
  <a class="nav-btn" href="#" id="navUser" onclick="logout()">Log Out</a>
</nav>

<div class="page">
  <div class="page-header">
    <h1 id="pageTitle">📊 Remediation Cluster Report</h1>
    <p id="pageSubtitle"></p>
  </div>

  <div id="statsBar" class="stats-bar"></div>
  <div id="errorBox" class="error-box" style="display:none"></div>

  <div id="loadingMain" class="loading">
    <div class="spinner"></div>
    <div id="loadingMsg"></div>
  </div>

  <div id="mainContent" style="display:none">
    <div class="tabs" id="tabsRow"></div>

    <div id="tab-date"     class="tab-panel active"></div>
    <div id="tab-owner"    class="tab-panel"></div>
    <div id="tab-severity" class="tab-panel"></div>
    <div id="tab-semantic" class="tab-panel">
      <div class="semantic-controls">
        <h3 id="semTitle"></h3>
        <p  id="semDesc"></p>
        <div class="ai-form">
          <input type="password" id="openaiKeyInput" autocomplete="off"/>
          <button class="btn-primary" id="btnGenerate" onclick="generateSemantic()"></button>
        </div>
        <div class="ai-note" id="semNote"></div>
      </div>
      <div id="semanticContent"></div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────
let allMeasures = [];
let _activeTab  = 'date';
let _semanticDone = false;

// ── Auth / Theme ──────────────────────────────────────────────
async function logout(){
  await fetch('/api/auth/logout',{method:'POST'});
  window.location.href='/login';
}
function toggleTheme(){
  const h=document.documentElement;
  const next=h.getAttribute('data-theme')==='dark'?'light':'dark';
  h.setAttribute('data-theme',next);
  localStorage.setItem('odito-theme',next);
}
(function(){
  const th=localStorage.getItem('odito-theme')||'light';
  document.documentElement.setAttribute('data-theme',th);
})();

// ── Tab switching ─────────────────────────────────────────────
function switchTab(name){
  _activeTab=name;
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===name);
  });
  document.querySelectorAll('.tab-panel').forEach(p=>{
    p.classList.toggle('active', p.id==='tab-'+name);
  });
}

// ── Static labels (re-applied on lang change) ─────────────────
function applyPageLabels(){
  document.getElementById('pageTitle').textContent   = '📊 '+t('rem.title');
  document.getElementById('pageSubtitle').textContent= t('rem.subtitle');
  document.getElementById('loadingMsg').textContent  = t('rem.loading');
  document.getElementById('semTitle').textContent    = t('rem.semantic_title');
  document.getElementById('semDesc').textContent     = t('rem.semantic_desc');
  document.getElementById('openaiKeyInput').placeholder = t('rem.semantic_key_ph');
  document.getElementById('btnGenerate').textContent = t('rem.btn_generate');
  document.getElementById('semNote').textContent     = t('rem.semantic_note');
  // Rebuild tabs row
  const tabs=[
    {id:'date',     key:'rem.tab_date'},
    {id:'owner',    key:'rem.tab_owner'},
    {id:'severity', key:'rem.tab_severity'},
    {id:'semantic', key:'rem.tab_semantic'},
  ];
  document.getElementById('tabsRow').innerHTML=tabs.map(tab=>`
    <button class="tab-btn${_activeTab===tab.id?' active':''}"
            data-tab="${tab.id}" onclick="switchTab('${tab.id}')">
      ${t(tab.key)}
    </button>`).join('');
}

// ── Helpers ───────────────────────────────────────────────────
const PRI_CLASSES={1:'pri-1',2:'pri-2',3:'pri-3',4:'pri-4'};

function priorityBadge(p){
  return `<span class="priority-badge ${PRI_CLASSES[p]||'pri-3'}">${t('priority.'+p)||'–'}</span>`;
}
function statusChip(s){
  return `<span class="meta-chip chip-status-${s}">${t('status.'+s)||s}</span>`;
}
function deadlineChip(dl, status){
  if(!dl) return '';
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(dl);
  const diff=Math.round((d-today)/86400000);
  const overdue=diff<0&&status!=='completed';
  if(overdue){
    return `<span class="meta-chip chip-deadline">${t('rem.overdue_days', String(Math.abs(diff)))}</span>`;
  }
  return `<span class="meta-chip chip-deadline ok">${t('rem.deadline_ok', dl)}</span>`;
}
function ownerChip(owner){
  if(!owner||owner==='N/A') return '';
  return `<span class="meta-chip chip-owner">👤 ${owner}</span>`;
}
function countLabel(n){
  return n===1 ? `1 ${t('rem.count_one')}` : `${n} ${t('rem.count_many')}`;
}

function measureCard(m){
  const desc=m.description||'–';
  const auditLink=`<a href="/audit/${m.audit_id}">${m.report_ref}</a>`;
  const findingLink=m.finding_id
    ?`<a href="/finding/${m.finding_id}">${m.finding_ref||'NC'}: ${m.finding_title}</a>`:'';
  return `
  <div class="measure-card">
    <div class="measure-desc">${desc}</div>
    <div class="measure-meta">
      ${priorityBadge(m.priority)}
      ${statusChip(m.status)}
      ${ownerChip(m.owner_display)}
      ${deadlineChip(m.deadline, m.status)}
      <span style="font-size:.75rem;color:var(--text2)">
        ${auditLink}${findingLink?' → '+findingLink:''}
      </span>
    </div>
  </div>`;
}

function clusterGroup(title, measures, opts={}){
  const n=measures.length;
  const overdueClass=opts.overdue?'cluster-overdue':'';
  const themeHtml=opts.theme?`<div class="cluster-theme">${opts.theme}</div>`:'';
  return `
  <div class="cluster-group ${overdueClass}">
    <div class="cluster-header"
         onclick="const b=this.nextElementSibling;b.style.display=b.style.display==='none'?'flex':'none'">
      <div>
        <div class="cluster-title">${title}</div>
        ${themeHtml}
      </div>
      <span class="cluster-badge">${countLabel(n)}</span>
    </div>
    <div class="cluster-body" style="display:flex">
      ${measures.map(measureCard).join('')}
    </div>
  </div>`;
}

// ── Stats bar ─────────────────────────────────────────────────
function renderStats(){
  const total=allMeasures.length;
  const completed=allMeasures.filter(m=>m.status==='completed').length;
  const today=new Date(); today.setHours(0,0,0,0);
  const overdue=allMeasures.filter(m=>{
    if(m.status==='completed'||!m.deadline) return false;
    return new Date(m.deadline)<today;
  }).length;
  const owners=new Set(allMeasures.map(m=>m.owner_display).filter(o=>o&&o!=='N/A')).size;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-pill">${t('rem.stat_total')} <strong>${total}</strong></div>
    <div class="stat-pill">${t('rem.stat_completed')} <strong>${completed}</strong></div>
    <div class="stat-pill">${t('rem.stat_overdue')} <strong class="danger">${overdue}</strong></div>
    <div class="stat-pill">${t('rem.stat_owners')} <strong>${owners}</strong></div>`;
}

// ── Tab: Per Data ─────────────────────────────────────────────
function renderByDate(){
  const today=new Date(); today.setHours(0,0,0,0);
  const buckets={};
  const ORDER=['overdue_60p','overdue_31_60','overdue_0_30','next_0_30','next_31_60','next_61_90','next_90p','no_dl'];
  const LABELS={
    overdue_60p:  t('rem.date_overdue_60p'),
    overdue_31_60:t('rem.date_overdue_31_60'),
    overdue_0_30: t('rem.date_overdue_0_30'),
    next_0_30:    t('rem.date_next_0_30'),
    next_31_60:   t('rem.date_next_31_60'),
    next_61_90:   t('rem.date_next_61_90'),
    next_90p:     t('rem.date_next_90p'),
    no_dl:        t('rem.date_no_dl'),
  };
  const IS_OVERDUE={overdue_60p:true,overdue_31_60:true,overdue_0_30:true};

  for(const m of allMeasures){
    let key;
    if(!m.deadline){key='no_dl';}
    else {
      const ref=(m.status==='completed'&&m.completion_date)?new Date(m.completion_date):new Date(m.deadline);
      const diff=Math.round((ref-today)/86400000);
      if(diff<-60) key='overdue_60p';
      else if(diff<-30) key='overdue_31_60';
      else if(diff<0)  key='overdue_0_30';
      else if(diff<=30) key='next_0_30';
      else if(diff<=60) key='next_31_60';
      else if(diff<=90) key='next_61_90';
      else key='next_90p';
    }
    (buckets[key]=buckets[key]||[]).push(m);
  }

  const html=ORDER.filter(k=>buckets[k]).map(k=>
    clusterGroup(LABELS[k], buckets[k], {overdue:!!IS_OVERDUE[k]})
  ).join('');
  document.getElementById('tab-date').innerHTML=html||`<div class="empty">${t('rem.empty')}</div>`;
}

// ── Tab: Per Responsabile ─────────────────────────────────────
function renderByOwner(){
  const groups={};
  for(const m of allMeasures){
    const key=m.owner_display||'N/A';
    (groups[key]=groups[key]||[]).push(m);
  }
  const sorted=Object.entries(groups).sort((a,b)=>b[1].length-a[1].length);
  const html=sorted.map(([owner,ms])=>clusterGroup(`👤 ${owner}`,ms)).join('');
  document.getElementById('tab-owner').innerHTML=html||`<div class="empty">${t('rem.empty')}</div>`;
}

// ── Tab: Per Severity ─────────────────────────────────────────
function renderBySeverity(){
  const groups={};
  for(const m of allMeasures){(groups[m.priority||3]=groups[m.priority||3]||[]).push(m);}
  const SEVLABELS={1:t('rem.sev_1'),2:t('rem.sev_2'),3:t('rem.sev_3'),4:t('rem.sev_4')};
  const html=[1,2,3,4].filter(p=>groups[p]?.length).map(p=>
    clusterGroup(SEVLABELS[p], groups[p])
  ).join('');
  document.getElementById('tab-severity').innerHTML=html||`<div class="empty">${t('rem.empty')}</div>`;
}

// ── Tab: Semantico ────────────────────────────────────────────
async function generateSemantic(){
  const btn=document.getElementById('btnGenerate');
  const key=document.getElementById('openaiKeyInput').value.trim()||null;
  const box=document.getElementById('semanticContent');
  btn.disabled=true;
  box.innerHTML=`<div class="loading"><div class="spinner"></div><div>${t('rem.analyzing')}</div></div>`;
  try{
    const res=await fetch('/api/reports/remediation/semantic',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({openai_key:key})
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.detail||'Error');
    renderSemantic(data);
    _semanticDone=true;
  } catch(e){
    box.innerHTML=`<div class="error-box">❌ ${e.message}</div>`;
  } finally{btn.disabled=false;}
}

function renderSemantic(data){
  const clusters=data?.clusters||[];
  if(!clusters.length){
    document.getElementById('semanticContent').innerHTML=`<div class="empty">${t('rem.no_clusters')}</div>`;
    return;
  }
  const byId={};
  for(const m of allMeasures) byId[m.id]=m;
  const html=clusters.map(c=>{
    const ms=(c.measure_ids||[]).map(id=>byId[id]).filter(Boolean);
    return clusterGroup(`🏷 ${c.name}`, ms, {theme:c.theme});
  }).join('');
  document.getElementById('semanticContent').innerHTML=html||`<div class="empty">${t('rem.no_cluster_measures')}</div>`;
}

// ── renderPage — called by i18n setLang() ─────────────────────
function renderPage(){
  applyPageLabels();
  applyNavLinks();
  if(allMeasures.length===0) return;
  renderStats();
  renderByDate();
  renderByOwner();
  renderBySeverity();
  // Semantic: only re-render labels in controls (don't re-call AI)
  // cluster cards already re-rendered by renderSemantic if done, else nothing
}

// ── Init ──────────────────────────────────────────────────────
async function init(){
  applyPageLabels();
  applyTranslations();

  const me=await fetch('/api/auth/me').then(r=>r.json());
  if(!me.authenticated){window.location.href='/login';return;}
  if(me.role!=='auditor'&&!me.is_admin){window.location.href='/';return;}

  setNavUser(me);
  applyNavLinks();
  document.getElementById('navNewAudit').style.display='';
  if(me.is_admin) document.getElementById('navAdmin').style.display='';
  document.getElementById('navActions').style.display='';

  try{
    const data=await fetch('/api/reports/remediation').then(r=>r.json());
    allMeasures=data.measures||[];
    document.getElementById('loadingMain').style.display='none';
    document.getElementById('mainContent').style.display='block';
    renderStats();
    renderByDate();
    renderByOwner();
    renderBySeverity();
  } catch(e){
    document.getElementById('loadingMain').style.display='none';
    const eb=document.getElementById('errorBox');
    eb.textContent=t('rem.err_load')+e.message;
    eb.style.display='block';
  }
}

applyPageLabels();
applyTranslations();
init();
</script>
</body>
</html>
